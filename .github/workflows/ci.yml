name: CI

on:
  push:
    branches: ["master", "copilot/**"]
  pull_request:
    branches: ["master"]

env:
  MIX_ENV: test

jobs:
  # ── format / credo / compile / test ──────────────────────────────────────
  ci:
    name: Format · Credo · Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libglew-dev

      - name: Restore Mix dependency cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install Mix dependencies
        if: steps.mix-cache.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Check code formatting
        run: mix format --check-formatted

      - name: Run Credo (strict)
        run: mix credo --strict

      - name: Compile (including NIF)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  # ── dialyzer ─────────────────────────────────────────────────────────────
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libglew-dev

      - name: Restore Mix dependency cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install Mix dependencies
        if: steps.mix-cache.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-otp26-elixir1.16-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-otp26-elixir1.16-

      - name: Create PLT directory
        run: mkdir -p priv/plts

      - name: Compile
        run: mix compile

      - name: Run Dialyzer
        run: mix dialyzer --format github
