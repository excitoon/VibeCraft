name: Auto Tag

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    name: Bump Patch Version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version tag
        id: latest
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Compute next patch version
        id: next
        run: |
          VERSION="${{ steps.latest.outputs.tag }}"
          VERSION="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

      - name: Trigger release workflow
        run: gh workflow run release.yml --ref "${{ steps.next.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
