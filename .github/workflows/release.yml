name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: osx-x86_64
            os: macos-15-intel
          - name: osx-arm64
            os: macos-14
          - name: windows-x86_64
            os: windows-latest

    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libglew-dev

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 glew

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: vcpkg install sdl2:x64-windows glew:x64-windows

      - name: Install Mix dependencies
        run: mix deps.get --only prod

      - name: Compile (including NIF)
        if: runner.os != 'Windows'
        run: mix compile

      # On Windows we pass the vcpkg toolchain file so that cmake's
      # find_package() calls can locate SDL2 and GLEW installed by vcpkg.
      # C:\vcpkg is the pre-installed vcpkg root on GitHub Actions Windows runners.
      - name: Compile (including NIF) - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CMAKE_TOOLCHAIN_FILE: C:\vcpkg\scripts\buildsystems\vcpkg.cmake
        run: mix compile

      - name: Build release
        run: mix release

      - name: Package release (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "vibe_craft-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" \
            -C _build/prod/rel/vibe_craft .

      - name: Package release (macOS)
        if: runner.os == 'macOS'
        run: |
          # Build a proper .app bundle so users get a drag-to-Applications DMG
          mkdir -p "VibeCraft.app/Contents/MacOS"
          mkdir -p "VibeCraft.app/Contents/Resources"

          # Minimal Info.plist required by macOS to treat the folder as an app
          cat > "VibeCraft.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>VibeCraft</string>
              <key>CFBundleDisplayName</key>
              <string>VibeCraft</string>
              <key>CFBundleExecutable</key>
              <string>vibe_craft</string>
              <key>CFBundleIdentifier</key>
              <string>com.vibecraft.VibeCraft</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
          </dict>
          </plist>
          PLIST

          # Launcher: the Mix release entry point lives in bin/vibe_craft
          cat > "VibeCraft.app/Contents/MacOS/vibe_craft" << 'LAUNCHER'
          #!/bin/bash
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec "$DIR/../Resources/bin/vibe_craft" foreground
          LAUNCHER
          chmod +x "VibeCraft.app/Contents/MacOS/vibe_craft"

          # Copy the entire Mix release into Resources
          cp -r _build/prod/rel/vibe_craft/. "VibeCraft.app/Contents/Resources/"

          # Stage the DMG: app bundle + /Applications symlink for drag-and-drop UX
          mkdir -p dmg_staging
          cp -r "VibeCraft.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "VibeCraft" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "vibe_craft-${{ github.ref_name }}-${{ matrix.name }}.dmg"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path _build/prod/rel/vibe_craft/* `
            -DestinationPath "vibe_craft-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe_craft-${{ matrix.name }}
          path: |
            vibe_craft-*.tar.gz
            vibe_craft-*.dmg
            vibe_craft-*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
